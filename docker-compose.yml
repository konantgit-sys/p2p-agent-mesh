# P2P Agent Mesh — Docker Compose
# Phase 1: relay + agent template
# Использование:
#   docker-compose up -d                    # relay + 1 agent (echo)
#   docker-compose --env-file snin.env up   # SNIN DAO pilot
#   docker-compose run agent --help         # CLI справка

services:
  # === Relay (public seed node) ===
  relay:
    build: .
    command: python -m relay.server --port 8443 --host 0.0.0.0
    ports:
      - "${RELAY_PORT:-8443}:8443"
    environment:
      - RELAY_MAX_MSGS_PER_SEC=${RELAY_MAX_MSGS_PER_SEC:-10}
      - RELAY_MAX_CONN_PER_IP=${RELAY_MAX_CONN_PER_IP:-5}
      - RELAY_MAX_PAYLOAD=${RELAY_MAX_PAYLOAD:-1048576}
    volumes:
      - relay-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8443)); s.close(); print('ok')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # === Agent (шаблон — копировать для каждого агента) ===
  agent:
    build: .
    command: >
      python cli.py
      --agent ${AGENT_NAME:-echo_agent}
      --capability ${AGENT_CAP:-echo}
      --port ${AGENT_PORT:-0}
      --relay-host ${RELAY_HOST:-relay}
      --relay-port ${RELAY_PORT:-8443}
      ${AGENT_LISTEN:+--listen}
    environment:
      - MESH_TLS=${MESH_TLS:-1}
    depends_on:
      relay:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - ""        # активен по умолчанию
      - agent

volumes:
  relay-data:
